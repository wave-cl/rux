[build]
target = "x86_64-unknown-none"

# ── x86_64 ────────────────────────────────────────────────────────────────
#
# target-cpu=haswell: Haswell scheduling model for instruction-level
#   parallelism tuning. Haswell implies BMI1/BMI2/POPCNT/LZCNT/MOVBE
#   (all GPR-only, safe in kernel) plus SSE through AVX2 (unsafe — see below).
#
# target-feature: We explicitly re-enable the GPR extensions and suppress
#   ALL xmm/ymm/mm register usage:
#   - +soft-float: soft-float ABI, no SSE for parameter passing or float ops
#   - -mmx,-sse,-sse2,-sse3,-ssse3,-sse4.1,-sse4.2: kill all SSE tiers
#   - -avx,-avx2,-fma: kill all AVX tiers
#   target-cpu=haswell re-enables SSE/SSE2/SSE3/MMX (they're Haswell baseline).
#   Without explicit suppression, LLVM will generate movdqu/movaps for struct
#   copies and memcpy, touching xmm registers. If an interrupt fires mid-copy,
#   the current task's FPU context is silently corrupted.
#
# code-model=kernel: all code lives in the top 2GB of virtual address space
#   (0xFFFFFFFF80000000+). Every global reference uses 32-bit sign-extended
#   addressing — saves instruction bytes on every static, global, and function
#   pointer load. This is -mcmodel=kernel in GCC/Clang.
#
# Linker: lld with --icf=all (merge identical functions) and --gc-sections
#   (remove unreferenced sections). Both reduce code size → better I-cache.
[target.x86_64-unknown-none]
rustflags = [
    "-C", "target-cpu=haswell",
    "-C", "target-feature=+bmi1,+bmi2,+popcnt,+lzcnt,+soft-float,-mmx,-sse,-sse2,-sse3,-ssse3,-sse4.1,-sse4.2,-avx,-avx2,-fma",
    # code-model=kernel disabled for now — requires higher-half mapping.
    # Re-enable when the kernel runs at 0xFFFFFFFF80000000+.
    # "-C", "code-model=kernel",
    "-C", "force-frame-pointers=no",
    "-C", "link-arg=-z", "-C", "link-arg=max-page-size=4096",
    "-C", "link-arg=--icf=all",
    "-C", "link-arg=--gc-sections",
    "-Z", "stack-protector=strong",
]

# ── aarch64 ───────────────────────────────────────────────────────────────
#
# target-cpu=generic: baseline ARMv8-A without LSE atomics, so the kernel
# runs on both QEMU cortex-a72 AND Apple Silicon. LSE atomics (ldadd, cas)
# require ARMv8.1-A; cortex-a72 is ARMv8.0-A and faults on them.
# apple-m1 was used previously but generates ldadd that crashes on QEMU.
#
# NEON is architecturally mandatory — cannot be suppressed.
[target.aarch64-unknown-none]
rustflags = [
    "-C", "target-cpu=generic",
    "-C", "force-frame-pointers=no",
    "-C", "link-arg=-z", "-C", "link-arg=max-page-size=16384",
    "-C", "link-arg=--icf=all",
    "-C", "link-arg=--gc-sections",
    "-Z", "stack-protector=strong",
]
