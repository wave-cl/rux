[target.x86_64-unknown-none]
rustflags = ["-C", "relocation-model=static", "-C", "link-arg=--image-base=0xB000000", "-C", "link-arg=-z", "-C", "link-arg=noexecstack", "-C", "link-arg=--no-pie"]

[target.aarch64-unknown-none]
rustflags = ["-C", "relocation-model=static", "-C", "target-feature=-neon", "-C", "link-arg=--image-base=0xB000000", "-C", "link-arg=-z", "-C", "link-arg=noexecstack", "-C", "link-arg=--no-pie"]
